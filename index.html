<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Star Tracker - บันทึกความสำเร็จของฉัน</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-slate-50 text-slate-800 font-sans min-h-screen flex items-center justify-center">

    <div id="login-screen" class="max-w-md w-full mx-auto p-6 text-center space-y-6">
        <div class="bg-white p-8 rounded-3xl shadow-xl border border-slate-100 space-y-6">
            <div class="text-5xl">🔐</div>
            <div class="space-y-1">
                <h2 class="text-xl font-bold text-slate-700">ไดอารี่ความสำเร็จส่วนตัว</h2>
                <p class="text-xs text-slate-400">กรุณาเข้าสู่ระบบเพื่ออ่านและบันทึกดาวของคุณ</p>
            </div>
            
            <form id="login-form" class="space-y-4 text-left">
                <div>
                    <label class="block text-xs font-semibold text-slate-500 mb-1">อีเมล</label>
                    <input type="email" id="login-email" required placeholder="your-email@example.com"
                        class="w-full border border-slate-200 rounded-xl px-3 py-2.5 text-sm focus:outline-none focus:border-indigo-500 focus:ring-2 focus:ring-indigo-100">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-slate-500 mb-1">รหัสผ่าน</label>
                    <input type="password" id="login-password" required placeholder="••••••••"
                        class="w-full border border-slate-200 rounded-xl px-3 py-2.5 text-sm focus:outline-none focus:border-indigo-500 focus:ring-2 focus:ring-indigo-100">
                </div>
                
                <button type="submit" id="login-btn" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-medium py-3 rounded-xl text-sm transition-colors shadow-md shadow-indigo-100 cursor-pointer">
                    เข้าสู่ระบบ 🚀
                </button>
            </form>
            <p id="login-error" class="text-xs text-red-500 font-medium hidden">❌ อีเมลหรือรหัสผ่านไม่ถูกต้อง</p>
        </div>
    </div>

    <div id="main-app" class="max-w-md w-full mx-auto p-4 space-y-6 hidden self-start">
        
        <div class="flex justify-between items-center px-1">
            <span class="text-xs text-slate-400 font-medium" id="user-display">ผู้ใช้: กำลังโหลด...</span>
            <button onclick="handleLogout()" class="text-xs bg-slate-200 hover:bg-red-50 hover:text-red-600 text-slate-600 px-2.5 py-1.5 rounded-lg transition-colors cursor-pointer font-medium">
                🔒 ออกจากระบบ
            </button>
        </div>

        <div class="bg-gradient-to-br from-indigo-500 to-purple-600 text-white p-6 rounded-3xl shadow-xl text-center space-y-4">
            <h1 class="text-xl font-medium opacity-90">บันทึกความสำเร็จ</h1>
            <div class="space-y-1">
                <span id="level-badge" class="bg-white/20 text-xs px-3 py-1 rounded-full font-bold tracking-wider uppercase">Level 1</span>
                <div class="text-5xl font-black tracking-tight flex justify-center items-center gap-2 pt-2">
                    <span id="total-stars">0</span> <span class="text-amber-300">⭐</span>
                </div>
            </div>
            <div class="space-y-1 text-left">
                <div class="flex justify-between text-xs opacity-80 font-medium">
                    <span id="current-rank-name">ระดับที่ 1</span>
                    <span id="progress-text">0 / 1,000 ดาว</span>
                </div>
                <div class="w-full bg-white/20 h-3 rounded-full overflow-hidden">
                    <div id="progress-bar" class="bg-amber-300 h-full transition-all duration-500" style="width: 0%"></div>
                </div>
            </div>
        </div>

        <div class="bg-slate-100 p-4 rounded-2xl border border-slate-200/60 space-y-2">
            <details class="group">
                <summary class="text-xs font-bold text-slate-600 cursor-pointer list-none flex justify-between items-center">
                    <span>➕ เพิ่มหมวดหมู่ความสำเร็จใหม่</span>
                    <span class="transition-transform group-open:rotate-180">👇</span>
                </summary>
                <div class="pt-3 flex gap-2">
                    <input type="text" id="new-cat-input" placeholder="เช่น 📚 การเรียนรู้ หรือ ✈️ ท่องเที่ยว" 
                        class="w-full text-xs border border-slate-200 rounded-xl px-3 py-2 focus:outline-none focus:ring-2 focus:ring-indigo-500 bg-white">
                    <button onclick="addNewCategory()" class="bg-slate-700 hover:bg-slate-800 text-white text-xs font-medium px-4 py-2 rounded-xl transition-colors cursor-pointer whitespace-nowrap">
                        บันทึกหมวด
                    </button>
                </div>
            </details>
        </div>

        <div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-100 space-y-4">
            <h2 id="form-title" class="font-bold text-lg text-slate-700 flex items-center gap-2">
                ✍️ บันทึกความสำเร็จวันนี้
            </h2>
            <form id="star-form" class="space-y-3">
                <input type="hidden" id="edit-id" value="">
                <div>
                    <label class="block text-xs font-semibold text-slate-500 mb-1">สำเร็จเรื่องอะไร?</label>
                    <input type="text" id="title" required placeholder="พิมพ์เรื่องที่คุณภูมิใจ..." 
                        class="w-full border border-slate-200 rounded-xl px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500">
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="block text-xs font-semibold text-slate-500 mb-1">หมวดหมู่</label>
                        <select id="category" class="w-full border border-slate-200 rounded-xl px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 bg-white"></select>
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-slate-500 mb-1">สำเร็จเมื่อวันที่</label>
                        <input type="date" id="success-date" required class="w-full border border-slate-200 rounded-xl px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 bg-white">
                    </div>
                </div>
                <div>
                    <label class="block text-xs font-semibold text-slate-500 mb-1">ให้ดาวตัวเอง</label>
                    <select id="stars" class="w-full border border-slate-200 rounded-xl px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 bg-white">
                        <option value="1">⭐ (+1 ดาว)</option>
                        <option value="2">⭐⭐ (+2 ดาว)</option>
                        <option value="3">⭐⭐⭐ (+3 ดาว)</option>
                        <option value="4">⭐⭐⭐⭐ (+4 ดาว)</option>
                        <option value="5" selected>⭐⭐⭐⭐⭐ (+5 ดาว)</option>
                    </select>
                </div>
                <div class="flex gap-2">
                    <button type="button" id="cancel-edit-btn" class="hidden bg-slate-200 hover:bg-slate-300 text-slate-600 font-medium px-4 py-2.5 rounded-xl text-sm transition-colors cursor-pointer">ยกเลิก</button>
                    <button type="submit" id="submit-btn" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-medium py-2.5 rounded-xl text-sm transition-colors shadow-md shadow-indigo-100 cursor-pointer">
                        บันทึกและรับดาว 🚀
                    </button>
                </div>
            </form>
        </div>

        <div class="space-y-3">
            <h2 class="font-bold text-lg text-slate-700 flex items-center gap-2 px-1">
                📜 ไทม์ไลน์ความภูมิใจ
            </h2>

            <div class="px-1">
                <input type="text" id="search-input" placeholder="🔍 พิมพ์คำค้นหาบันทึกของคุณที่นี่..." 
                    class="w-full text-sm border border-slate-200 rounded-xl px-3 py-2 focus:outline-none focus:ring-2 focus:ring-indigo-500 bg-white">
            </div>

            <div id="category-filter-container" class="flex flex-wrap gap-2 pb-1 text-[11px]"></div>

            <div id="timeline-list" class="space-y-3 min-h-[100px]"></div>

            <div id="pagination-controls" class="flex justify-center items-center gap-1 pt-2 text-xs font-medium"></div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = "https://ctftvkbgnucvscfdfotf.supabase.co";
        const SUPABASE_KEY = "sb_publishable_zoMFda_EbeJaCSDVIzNhCQ_WzNFEdwc";
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const loginScreen = document.getElementById('login-screen');
        const mainApp = document.getElementById('main-app');
        const loginForm = document.getElementById('login-form');
        const dateInput = document.getElementById('success-date');
        const timelineList = document.getElementById('timeline-list');
        const totalStarsEl = document.getElementById('total-stars');
        const editIdInput = document.getElementById('edit-id');
        const searchInput = document.getElementById('search-input');
        const paginationControls = document.getElementById('pagination-controls');
        const categorySelect = document.getElementById('category');
        const filterContainer = document.getElementById('category-filter-container');

        dateInput.valueAsDate = new Date();

        let currentPage = 1;
        const itemsPerPage = 10; 
        let currentCategory = "All";
        let searchQuery = "";
        let categoriesCache = [];

        async function checkExistingSession() {
            const { data: { session } } = await _supabase.auth.getSession();
            if (session) showMainApp(session.user.email);
        }

        function showMainApp(email) {
            loginScreen.classList.add('hidden');
            document.body.className = "bg-slate-50 text-slate-800 font-sans min-h-screen";
            mainApp.classList.remove('hidden');
            document.getElementById('user-display').innerText = `ผู้ใช้: ${email}`;
            
            fetchTotalStars();
            loadCategoriesSystem(); 
        }

        async function loadCategoriesSystem() {
            const { data, error } = await _supabase.from('categories').select('*').order('name', { ascending: true });
            if (!error && data) {
                categoriesCache = data;
                
                categorySelect.innerHTML = '';
                data.forEach(cat => {
                    const opt = document.createElement('option');
                    opt.value = cat.name;
                    opt.innerText = cat.name;
                    categorySelect.appendChild(opt);
                });

                renderCategoryFilterButtons();
                fetchData();
            }
        }

        function renderCategoryFilterButtons() {
            filterContainer.innerHTML = '';
            
            const allActive = currentCategory === "All";
            filterContainer.innerHTML = `<button onclick="changeCategory('ทั้งหมด')" class="${allActive ? 'bg-indigo-600 text-white' : 'bg-white text-slate-600 border border-slate-200'} px-3 py-2 rounded-xl font-medium whitespace-nowrap cursor-pointer">ทั้งหมด</button>`;
            
            categoriesCache.forEach(cat => {
                const active = currentCategory === cat.name;
                const btn = document.createElement('button');
                btn.innerText = cat.name;
                btn.className = `${active ? 'bg-indigo-600 text-white' : 'bg-white text-slate-600 border border-slate-200'} px-3 py-2 rounded-xl font-medium whitespace-nowrap cursor-pointer`;
                btn.onclick = () => changeCategory(cat.name);
                filterContainer.appendChild(btn);
            });
        }

        async function addNewCategory() {
            const input = document.getElementById('new-cat-input');
            const name = input.value.trim();
            if (!name) return;

            const { error } = await _supabase.from('categories').insert([{ name: name }]);
            if (!error) {
                input.value = '';
                await loadCategoriesSystem(); 
            } else {
                alert("ไม่สามารถเพิ่มหมวดหมู่ได้: " + error.message);
            }
        }

        async function fetchData() {
            timelineList.innerHTML = `<div class="text-center py-8 text-slate-400 text-sm">กำลังโหลดไดอารี่...</div>`;
            const from = (currentPage - 1) * itemsPerPage;
            const to = from + itemsPerPage - 1;

            let query = _supabase
                .from('achievements')
                .select('*', { count: 'exact' }) 
                .order('success_date', { ascending: false })
                .order('created_at', { ascending: false })
                .range(from, to); 

            if (currentCategory !== "All") {
                query = query.eq('category', currentCategory);
            }

            if (searchQuery.trim() !== "") {
                query = query.ilike('title', `%${searchQuery}%`); 
            }

            const { data, error, count } = await query;
            if (!error) {
                renderTimeline(data);
                renderPaginationControls(count);
            }
        }

        function renderTimeline(data) {
            timelineList.innerHTML = '';
            if (!data || data.length === 0) {
                timelineList.innerHTML = `<div class="text-center py-8 text-slate-400 text-sm">ไม่พบประวัติบันทึกความสำเร็จ</div>`;
                return;
            }

            data.forEach(item => {
                const dateObj = new Date(item.success_date || item.created_at);
                const dateToShow = dateObj.toLocaleDateString('en-GB', { day: '2-digit', month: '2-digit', year: 'numeric' });

                const card = document.createElement('div');
                card.className = "bg-white p-4 rounded-xl shadow-xs border border-slate-100 flex justify-between items-center";
                card.innerHTML = `
                    <div class="space-y-1 max-w-[65%]">
                        <div class="flex items-center gap-2">
                            <span class="text-[10px] font-bold bg-slate-100 text-slate-600 px-2 py-0.5 rounded-md uppercase">${item.category}</span>
                            <span class="text-[11px] text-slate-400 font-medium">🗓️ ${dateToShow}</span>
                        </div>
                        <p class="text-sm font-normal text-slate-700 break-words">${item.title}</p>
                    </div>
                    <div class="flex items-center gap-2">
                        <div class="text-amber-500 font-bold text-xs bg-amber-50 px-2 py-1 rounded-lg border border-amber-100">+${item.stars} ⭐</div>
                        <div class="flex gap-1">
                            <button onclick="startEdit(${item.id})" class="p-1 hover:bg-slate-100 rounded-md cursor-pointer">✏️</button>
                            <button onclick="deleteItem(${item.id})" class="p-1 hover:bg-red-50 rounded-md cursor-pointer">🗑️</button>
                        </div>
                    </div>
                `;
                timelineList.appendChild(card);
            });
        }

        function renderPaginationControls(totalItems) {
            paginationControls.innerHTML = '';
            const totalPages = Math.ceil(totalItems / itemsPerPage);
            if (totalPages <= 1) return;

            const prevBtn = document.createElement('button');
            prevBtn.innerText = "◀️";
            prevBtn.disabled = currentPage === 1;
            prevBtn.className = `p-2 rounded-lg cursor-pointer ${currentPage === 1 ? 'opacity-30' : 'hover:bg-slate-200'}`;
            prevBtn.onclick = () => { currentPage--; fetchData(); };
            paginationControls.appendChild(prevBtn);

            for (let i = 1; i <= totalPages; i++) {
                const pageBtn = document.createElement('button');
                pageBtn.innerText = i;
                pageBtn.className = i === currentPage 
                    ? "bg-indigo-600 text-white w-8 h-8 rounded-lg font-bold shadow-xs"
                    : "bg-white border border-slate-200 hover:bg-slate-100 w-8 h-8 rounded-lg cursor-pointer text-slate-600";
                pageBtn.onclick = () => { currentPage = i; fetchData(); };
                paginationControls.appendChild(pageBtn);
            }

            const nextBtn = document.createElement('button');
            nextBtn.innerText = "▶️";
            nextBtn.disabled = currentPage === totalPages;
            nextBtn.className = `p-2 rounded-lg cursor-pointer ${currentPage === totalPages ? 'opacity-30' : 'hover:bg-slate-200'}`;
            nextBtn.onclick = () => { currentPage++; fetchData(); };
            paginationControls.appendChild(nextBtn);
        }

        function changeCategory(cat) {
            currentCategory = cat === "ทั้งหมด" ? "All" : cat;
            currentPage = 1;
            renderCategoryFilterButtons();
            fetchData();
        }

        let searchTimeout;
        searchInput.addEventListener('input', (e) => {
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(() => {
                searchQuery = e.target.value;
                currentPage = 1;
                fetchData();
            }, 300);
        });

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('login-btn');
            const errorEl = document.getElementById('login-error');
            btn.disabled = true; errorEl.classList.add('hidden');
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;
            const { data, error } = await _supabase.auth.signInWithPassword({ email, password });
            if (error) { errorEl.classList.remove('hidden'); btn.disabled = false; btn.innerText = "เข้าสู่ระบบ 🚀"; }
            else { showMainApp(data.user.email); }
        });

        async function handleLogout() { await _supabase.auth.signOut(); window.location.reload(); }
        async function fetchTotalStars() {
            const { data, error } = await _supabase.from('achievements').select('stars');
            if (!error && data) { let totalStars = 0; data.forEach(item => totalStars += item.stars); updateLevelDisplay(totalStars); }
        }
        
        function updateLevelDisplay(totalStars) {
            totalStarsEl.innerText = totalStars.toLocaleString(); 
            const level = Math.floor(totalStars / 1000) + 1;
            const starsInCurrentLevel = totalStars % 1000; 
            
            // ด้านบนคงรูปแแบบภาษาอังกฤษ Level ไว้ตามเดิม
            document.getElementById('level-badge').innerText = `Level ${level}`;
            
            // เปลี่ยนภาษาไทยด้านล่างจาก ขั้นที่ -> ระดับที่
            document.getElementById('current-rank-name').innerText = `ระดับที่ ${level}`;
            document.getElementById('progress-text').innerText = `${starsInCurrentLevel.toLocaleString()} / 1,000 ดาว`;
            document.getElementById('progress-bar').style.width = `${(starsInCurrentLevel / 1000) * 100}%`;
        }

        document.getElementById('star-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submit-btn'); btn.disabled = true;
            const id = editIdInput.value;
            const payload = {
                title: document.getElementById('title').value,
                category: document.getElementById('category').value,
                stars: parseInt(document.getElementById('stars').value),
                success_date: document.getElementById('success-date').value
            };
            const { error } = id ? await _supabase.from('achievements').update(payload).eq('id', id) : await _supabase.from('achievements').insert([payload]);
            if (!error) { resetForm(); await fetchTotalStars(); await fetchData(); }
            else { alert("บันทึกไม่สำเร็จ: " + error.message); }
            btn.disabled = false; btn.innerText = "บันทึกและรับดาว 🚀";
        });

        function startEdit(id) {
            _supabase.from('achievements').select('*').eq('id', id).single().then(({ data }) => {
                if (data) {
                    editIdInput.value = data.id;
                    document.getElementById('title').value = data.title;
                    document.getElementById('category').value = data.category;
                    document.getElementById('stars').value = data.stars;
                    document.getElementById('success-date').value = data.success_date;
                    document.getElementById('form-title').innerText = "✏️ แก้ไขบันทึกความสำเร็จ";
                    document.getElementById('submit-btn').innerText = "อัปเดตบันทึก 📝";
                    document.getElementById('cancel-edit-btn').classList.remove('hidden');
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                }
            });
        }
        function resetForm() {
            editIdInput.value = ''; document.getElementById('title').value = ''; dateInput.valueAsDate = new Date();
            document.getElementById('form-title').innerText = "✍️ บันทึกความสำเร็จวันนี้"; document.getElementById('submit-btn').innerText = "บันทึกและรับดาว 🚀";
            document.getElementById('cancel-edit-btn').classList.add('hidden');
        }
        async function deleteItem(id) { if (confirm("ลบบันทึกนี้ใช่ไหม?")) { await _supabase.from('achievements').delete().eq('id', id); await fetchTotalStars(); await fetchData(); } }
        document.getElementById('cancel-edit-btn').onclick = resetForm;
        checkExistingSession();
    </script>
</body>
</html>
